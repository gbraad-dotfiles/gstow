version: 2

project_name: tapewrap

before:
  hooks:
    - go mod tidy

builds:
  - id: tapewrap
    main: ./cmd/tapewrap
    binary: tapewrap
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: binary
    format: binary
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"

nfpms:
  - id: packages
    package_name: tapewrap
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: Ducttape Infra
    homepage: https://github.com/ducttape-infra/gstow
    maintainer: Ducttape Infra <developers@ducttape-infra.org>
    description: |-
      GNU Stow-compatible symlink manager.
      Invoke as "stow" for GNU Stow compatible mode.
    license: MIT
    formats:
      - apk
      - deb
      - rpm
    bindir: /usr/sbin
    contents:
      - src: ./LICENSE
        dst: /usr/share/licenses/tapewrap/LICENSE
      - src: /usr/sbin/tapewrap
        dst: /usr/sbin/stow
        type: symlink

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
